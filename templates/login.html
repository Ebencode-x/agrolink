<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgroLink | System Access</title>
    <style>
        body {
            background-color: black;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .matrix-container {
            border: 1px solid #00ff41;
            padding: 40px;
            background-color: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 15px #00ff41;
            width: 350px;
        }

        .error-box {
            color: #ff3131;
            border: 1px solid #ff3131;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            background: #1a0000;
            text-transform: uppercase;
        }

        h2 { text-align: center; color: #ffff00; }
        
        .input-group { margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 5px; font-size: 14px; }
        
        input, select {
            width: 100%;
            background: black;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 8px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: #ffff00; }

        .btn-initiate {
            width: 100%;
            background: #00ff41;
            color: black;
            border: none;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-initiate:hover { background: #00cc33; }
    </style>
</head>
<body>

    <h2>>>> SYSTEM_ACCESS_PORTAL</h2>

    <div class="matrix-container">
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error-box">
                [!] {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <label>Username:</label>
                <input type="text" name="u_name" required autofocus>
            </div>

            <div class="input-group">
                <label>Password:</label>
                <input type="password" name="u_pass" required>
            </div>

            <div class="input-group">
                <label>Phone Protocol:</label>
                <input type="text" name="u_phone" placeholder="06XXXXXXXX">
            </div>

            <div class="input-group">
                <label>Your Region:</label>
                <select name="u_region">
                    <option value="Mbeya">Mbeya</option>
                    <option value="Dar es Salaam">Dar es Salaam</option>
                    <option value="Dodoma">Dodoma</option>
                    <option value="Arusha">Arusha</option>
                    <option value="Mwanza">Mwanza</option>
                </select>
            </div>

            <button type="submit" class="btn-initiate">INITIALIZE_SESSION</button>
        </form>
    </div>

    <p style="font-size: 10px; margin-top: 20px; color: #333;">
        SECURE_CONNECTION: ENABLED | ENCRYPTION: PBKDF2_SHA256
    </p>

</body>
</html>
