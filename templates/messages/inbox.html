{% extends "base.html" %}
{% block title %}Ujumbe — AgroLink Tanzania{% endblock %}
{% block content %}
<style>
  .inbox-wrap{max-width:680px;margin:0 auto;padding:1.25rem clamp(0.75rem,4vw,1.5rem) 4rem}
  .inbox-header{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem}
  .inbox-header h1{font-family:var(--font-display);font-size:1.3rem;font-weight:800;color:var(--text-primary);margin:0}
  .inbox-badge{background:var(--accent);color:#fff;font-size:0.7rem;font-weight:700;padding:2px 8px;border-radius:20px;display:none}
  .conv-list{display:flex;flex-direction:column;gap:0.5rem}
  .conv-card{display:flex;align-items:center;gap:0.9rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.9rem 1rem;text-decoration:none;transition:border-color var(--transition),box-shadow var(--transition);cursor:pointer}
  .conv-card:hover{border-color:var(--brand-mid);box-shadow:0 2px 8px rgba(38,61,47,0.08)}
  .conv-card.unread{border-left:3px solid var(--accent)}
  .conv-avatar{width:42px;height:42px;border-radius:50%;background:var(--brand-mid);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1rem;flex-shrink:0}
  .conv-body{flex:1;min-width:0}
  .conv-top{display:flex;align-items:center;justify-content:space-between;gap:0.5rem;margin-bottom:0.2rem}
  .conv-name{font-weight:700;font-size:0.92rem;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv-time{font-size:0.72rem;color:var(--text-muted);flex-shrink:0}
  .conv-listing{font-size:0.75rem;color:var(--brand-mid);margin-bottom:0.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv-preview{font-size:0.82rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv-unread-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .role-tag{font-size:0.68rem;font-weight:600;padding:1px 7px;border-radius:10px;flex-shrink:0}
  .role-tag.buyer{background:#e8f5e9;color:#2e7d32}
  .role-tag.seller{background:#e3f2fd;color:#1565c0}
  .inbox-empty{text-align:center;padding:4rem 1rem;color:var(--text-muted)}
  .inbox-empty svg{opacity:0.3;margin-bottom:1rem}
  .inbox-empty p{font-size:0.9rem}
  .inbox-loading{text-align:center;padding:3rem;color:var(--text-muted);font-size:0.9rem}
  .inbox-error{background:#fff5f5;border:1px solid #fed7d7;border-radius:var(--radius-md);padding:1rem;color:#c53030;font-size:0.85rem;text-align:center}
</style>

<div class="inbox-wrap">
  <div class="inbox-header">
    <i data-lucide="message-square" style="width:22px;height:22px;color:var(--brand-mid)"></i>
    <h1>Ujumbe</h1>
    <span class="inbox-badge" id="unread-badge"></span>
  </div>
  <div class="conv-list" id="conv-list">
    <div class="inbox-loading">Inapakia mazungumzo...</div>
  </div>
</div>

<script>
async function loadInbox() {
  const list = document.getElementById('conv-list');
  try {
    const res = await fetch('/api/conversations/mine');
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Hitilafu');

    const convs = data.conversations || [];
    const totalUnread = convs.reduce((s, c) => s + c.unread, 0);

    if (totalUnread > 0) {
      const badge = document.getElementById('unread-badge');
      badge.textContent = totalUnread;
      badge.style.display = 'inline-block';
    }

    if (convs.length === 0) {
      list.innerHTML = `
        <div class="inbox-empty">
          <i data-lucide="inbox" style="width:48px;height:48px"></i>
          <p>Bado huna mazungumzo yoyote.</p>
          <p>Tembelea <a href="/listings" style="color:var(--accent)">Soko</a> uanze mazungumzo na muuzaji.</p>
        </div>`;
      lucide.createIcons();
      return;
    }

    list.innerHTML = convs.map(c => {
      const initials = c.other_name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      return `
        <a class="conv-card ${c.unread > 0 ? 'unread' : ''}" href="/messages/${c.id}">
          <div class="conv-avatar">${initials}</div>
          <div class="conv-body">
            <div class="conv-top">
              <span class="conv-name">${c.other_name}</span>
              <span class="conv-time">${c.last_at}</span>
            </div>
            <div class="conv-listing">${c.listing_title}</div>
            <div class="conv-preview">${c.last_message || 'Bado hakuna ujumbe'}</div>
          </div>
          ${c.unread > 0 ? '<div class="conv-unread-dot"></div>' : ''}
          <span class="role-tag ${c.role}">${c.role === 'buyer' ? 'Mnunuzi' : 'Muuzaji'}</span>
        </a>`;
    }).join('');
    lucide.createIcons();
  } catch(e) {
    list.innerHTML = `<div class="inbox-error">Hitilafu: ${e.message}</div>`;
  }
}
loadInbox();
</script>
{% endblock %}
