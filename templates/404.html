{% extends "base.html" %}
{% block title %}404 — Ukurasa Haukupatikana | AgroLink Tanzania{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 70px);display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--bg-page)">
  <div style="text-align:center;max-width:500px">
    <div style="font-family:var(--font-display);font-size:8rem;font-weight:800;line-height:1;color:var(--brand-dark);margin-bottom:1rem">404</div>
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem;margin-bottom:2rem;box-shadow:var(--shadow-md)">
      <i data-lucide="map-pin-off" style="width:48px;height:48px;color:var(--brand-mid);margin-bottom:1.5rem"></i>
      <h1 style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--text-primary);margin-bottom:0.75rem">Ukurasa Haukupatikana</h1>
      <p style="color:var(--text-secondary);line-height:1.7;margin-bottom:0.5rem">Samahani! Ukurasa unaotafuta haupo au umehamishwa.</p>
      <p style="color:var(--text-muted);font-size:0.85rem">Labda uliandika URL si sahihi, au ukurasa umefutwa.</p>
    </div>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
      <a href="/" style="display:inline-flex;align-items:center;gap:8px;background:var(--brand-mid);color:#fff;padding:0.85rem 2rem;border-radius:var(--radius-sm);font-family:var(--font-display);font-weight:600;text-decoration:none;transition:all var(--transition);box-shadow:var(--shadow-md)">
        <i data-lucide="home" style="width:18px;height:18px"></i>Rudi Nyumbani
      </a>
      <a href="/listings" style="display:inline-flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);padding:0.85rem 2rem;border-radius:var(--radius-sm);font-family:var(--font-display);font-weight:600;text-decoration:none;transition:all var(--transition);box-shadow:var(--shadow-sm)">
        <i data-lucide="store" style="width:18px;height:18px"></i>Angalia Soko
      </a>
    </div>
  </div>
</div>
{% endblock %}
