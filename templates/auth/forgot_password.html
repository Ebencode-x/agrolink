{% extends "base.html" %}
{% block title %}Forgot Password - AgroLink TZ{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-900 via-green-800 to-emerald-900 px-4">
  <div class="glass-card w-full max-w-md p-8 rounded-2xl">
    <div class="text-center mb-8">
      <div class="text-5xl mb-4">🔐</div>
      <h1 class="text-2xl font-bold text-white">Badilisha Nywila</h1>
      <p class="text-green-300 mt-2">Weka namba yako ya simu na nywila mpya</p>
    </div>
    <div id="alert" class="hidden mb-4 p-4 rounded-lg text-sm font-medium"></div>
    <form id="resetForm" class="space-y-5">
      <div>
        <label class="block text-green-300 text-sm font-medium mb-2">Namba ya Simu</label>
        <input type="tel" id="phone" placeholder="+255 XXX XXX XXX"
          class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/40 focus:outline-none focus:border-green-400"/>
      </div>
      <div>
        <label class="block text-green-300 text-sm font-medium mb-2">Nywila Mpya</label>
        <div class="relative">
          <input type="password" id="new_password" placeholder="Nywila mpya (herufi 6+)"
            class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/40 focus:outline-none focus:border-green-400"/>
          <button type="button" onclick="togglePassword()"
            class="absolute right-3 top-3 text-white/50 hover:text-white">👁️</button>
        </div>
        <div id="strengthBar" class="mt-2 h-1 rounded-full bg-white/10">
          <div id="strengthFill" class="h-1 rounded-full transition-all duration-300 w-0"></div>
        </div>
        <p id="strengthText" class="text-xs mt-1 text-white/40"></p>
      </div>
      <button type="submit"
        class="w-full py-3 bg-green-500 hover:bg-green-400 text-white font-bold rounded-xl transition-all duration-200">
        Badilisha Nywila
      </button>
    </form>
    <p class="text-center text-white/50 mt-6 text-sm">
      Umekumbuka nywila? <a href="/login" class="text-green-400 hover:text-green-300 font-medium">Ingia hapa</a>
    </p>
  </div>
</div>
<script>
function togglePassword() {
  const input = document.getElementById('new_password');
  input.type = input.type === 'password' ? 'text' : 'password';
}
document.getElementById('new_password').addEventListener('input', function() {
  const val = this.value;
  const fill = document.getElementById('strengthFill');
  const text = document.getElementById('strengthText');
  let strength = 0;
  if (val.length >= 6) strength++;
  if (val.length >= 10) strength++;
  if (/[A-Z]/.test(val)) strength++;
  if (/[0-9]/.test(val)) strength++;
  if (/[^A-Za-z0-9]/.test(val)) strength++;
  const colors = ['', 'bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-blue-500', 'bg-green-500'];
  const labels = ['', 'Dhaifu sana', 'Dhaifu', 'Ya kati', 'Nzuri', 'Bora sana'];
  fill.className = `h-1 rounded-full transition-all duration-300 ${colors[strength]}`;
  fill.style.width = `${strength * 20}%`;
  text.textContent = labels[strength];
  text.style.color = strength >= 4 ? '#4ade80' : strength >= 3 ? '#facc15' : '#f87171';
});
document.getElementById('resetForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const phone = document.getElementById('phone').value;
  const new_password = document.getElementById('new_password').value;
  const alert = document.getElementById('alert');
  const res = await fetch('/forgot-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({phone, new_password})
  });
  const data = await res.json();
  alert.classList.remove('hidden', 'bg-red-500/20', 'bg-green-500/20', 'text-red-300', 'text-green-300');
  if (res.ok) {
    alert.classList.add('bg-green-500/20', 'text-green-300');
    alert.textContent = data.message;
    setTimeout(() => window.location.href = '/login', 2000);
  } else {
    alert.classList.add('bg-red-500/20', 'text-red-300');
    alert.textContent = data.error;
  }
  alert.classList.remove('hidden');
});
</script>
{% endblock %}
