{% extends "base.html" %}
{% block title %}Asante — AgroLink Tanzania{% endblock %}
{% block content %}
<style>
:root{--brand-dark:#1C3D2A;--brand-mid:#2E6B47;--gray-200:#E5E7EB;--gray-600:#4B5563;--gray-900:#111827;}
.th-wrap{max-width:480px;margin:0 auto;padding:88px 24px;text-align:center;}
.th-icon{width:56px;height:56px;border-radius:50%;background:#ECFDF5;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.th-wrap h1{font-size:1.3rem;font-weight:800;color:var(--gray-900);margin:0 0 10px;}
.th-wrap p{font-size:.88rem;color:var(--gray-600);line-height:1.7;margin:0 0 24px;}
.th-btn{display:inline-block;background:var(--brand-mid);color:#fff;padding:11px 24px;border-radius:7px;font-size:.85rem;font-weight:700;text-decoration:none;}
.th-btn:hover{background:var(--brand-dark);}
</style>
<div class="th-wrap">
  <div class="th-icon">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1>Asante kwa Ombi Lako</h1>
  <p>Tumepokea ombi lako la ushirikiano. Timu yetu italipitia na kuwasiliana nawe hivi karibuni.</p>
  <a class="th-btn" href="/">Rudi Ukurasa wa Nyumbani</a>
</div>
{% endblock %}
